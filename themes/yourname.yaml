  ha-color-fill-neutral-quiet-hover: "rgba(59, 188, 255, 0.11)"
  ha-color-form-background-hover: "#0A1C32"
  ha-color-border-neutral-quiet: "var(--divider-color)"
  ha-color-border-neutral-default: "rgba(59, 188, 255, 0.22)"
  wa-color-surface-border: "var(--divider-color)"
  wa-color-neutral-fill-normal: "rgba(59, 188, 255, 0.80)"
  ha-color-text-primary: "var(--primary-text-color)"
  ha-color-text-secondary: "var(--secondary-text-color)"
  ha-color-text-disabled: "var(--disabled-text-color)"

