# ══════════════════════════════════════════════════════════════════
# YOUR NAME. — Home Assistant Themes  君の名は。
# Two dark variants in one file. Select from the HA theme picker.
#
# ┌─ Your Name. — Kataware-doki ───────────────────────────────────
# │  The magic twilight hour — lavender sky, comet amber, deep indigo
# │  Primary: #B48FFF  Accent: #E8933A  BG: #0A0B1E
# └────────────────────────────────────────────────────────────────
# ┌─ Your Name. — Tiamat ──────────────────────────────────────────
# │  The comet itself — electric blue, comet amber, deep navy
# │  Primary: #3BBCFF  Accent: #E8933A  BG: #07101E
# └────────────────────────────────────────────────────────────────
#
# Both themes share:
#   Frosted-glass cards and sidebars (backdrop-filter: blur)
#   Comet Tiamat amber accent  →  #E8933A
#   Lake Itomori teal          →  #6BC4D4
#   Same typography and sizing
#   Same structural token coverage (20 sections)
# ══════════════════════════════════════════════════════════════════


Your Name. - Kataware-doki:
  # ══════════════════════════════════════════════════════════════
  # KATAWARE-DOKI
  # The split-twilight moment — the sky bruised lavender,
  # the comet burning amber across the dark indigo above Itomori.
  # ══════════════════════════════════════════════════════════════

  # ── 1. Backdrop & Blur ────────────────────────────────────────
  ha-dialog-scrim-backdrop-filter: "blur(18px)"
  ha-dialog-scrim-background: "rgba(6, 7, 20, 0.58)"

  # ── 2. Typography ─────────────────────────────────────────────
  ha-font-family-body: "'Plus Jakarta Sans', 'Figtree', system-ui, Arial, sans-serif"
  primary-font-family: "'Plus Jakarta Sans', 'Figtree', system-ui, Arial, sans-serif"
  paper-font-common-base_-_font-family: "var(--primary-font-family)"
  paper-font-common-code_-_font-family: "'JetBrains Mono', 'Consolas', monospace"
  paper-font-body1_-_font-family: "var(--primary-font-family)"
  paper-font-subhead_-_font-family: "var(--primary-font-family)"
  paper-font-headline_-_font-family: "var(--primary-font-family)"
  paper-font-caption_-_font-family: "var(--primary-font-family)"
  paper-font-title_-_font-family: "var(--primary-font-family)"
  ha-card-header-font-family: "var(--primary-font-family)"
  ha-card-header-font-size: "15px"
  ha-card-header-letter-spacing: "0.01em"

  # ── 3. Header ─────────────────────────────────────────────────
  header-height: 40px
  app-header-background-color: "rgba(7, 8, 22, 0.64)"
  app-header-text-color: "#EAE6F8"
  app-header-edit-background-color: "rgba(18, 14, 44, 0.82)"
  app-header-edit-text-color: "#EAE6F8"
  app-header-selection-bar-color: "#B48FFF"

  # ── 4. Lovelace Background ────────────────────────────────────
  lovelace-background: 'center / cover no-repeat url("/local/backgrounds/yourname.jpg") fixed'

  # ── 5. Global Color Tokens ────────────────────────────────────
  primary-color: "#B48FFF"
  light-primary-color: "#CEBFFF"
  dark-primary-color: "#8260D8"
  accent-color: "#E8933A"
  light-accent-color: "#F2B06A"
  error-color: "#CF5070"
  warning-color: "#E8933A"
  success-color: "#64C9A0"
  info-color: "#7AACF0"

  # ── 6. Backgrounds ────────────────────────────────────────────
  primary-background-color: "#0A0B1E"
  secondary-background-color: "#0E1030"
  rgb-primary-background-color: "10, 11, 30"
  rgb-secondary-background-color: "14, 16, 48"

  # ── 7. Text ───────────────────────────────────────────────────
  primary-text-color: "#EAE6F8"
  secondary-text-color: "#9A8DC0"
  text-primary-color: "var(--primary-text-color)"
  disabled-text-color: "#544A72"
  text-accent-color: "#1C3557"
  error-state-color: "var(--error-color)"

  # ── 8. Dividers & Code ────────────────────────────────────────
  divider-color: "rgba(180, 143, 255, 0.13)"
  markdown-code-background-color: "rgba(10, 8, 26, 0.72)"

  # ── 9. Sidebar ────────────────────────────────────────────────
  sidebar-background-color: "rgba(8, 8, 22, 0.62)"
  sidebar-icon-color: "#70629E"
  sidebar-text-color: "#BCB2DE"
  sidebar-selected-background-color: "rgba(180, 143, 255, 0.16)"
  sidebar-selected-icon-color: "#CEBFFF"
  sidebar-selected-text-color: "#EAE6F8"

  # ── 10. Cards ─────────────────────────────────────────────────
  ha-card-border-radius: "16px"
  ha-card-background: "rgba(16, 12, 42, 0.50)"
  ha-card-box-shadow: "0 2px 28px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(180, 143, 255, 0.08)"
  ha-card-border-color: "rgba(180, 143, 255, 0.11)"
  ha-card-border-width: "1px"
  ha-card-header-color: "var(--primary-text-color)"
  card-background-color: "rgba(16, 12, 42, 0.50)"
  paper-card-background-color: "rgba(16, 12, 42, 0.50)"
  paper-card-header-color: "var(--primary-text-color)"
  paper-listbox-background-color: "rgba(8, 8, 22, 0.75)"
  rgb-card-background-color: "16, 12, 42"

  # ── 11. Dialogs & Popups ──────────────────────────────────────
  mdc-dialog-box-shadow: "0 8px 56px rgba(0, 0, 0, 0.60)"
  popup-background-color: "rgba(12, 9, 32, 0.88)"

  # ── 12. Inputs & Forms ────────────────────────────────────────
  input-fill-color: "rgba(180, 143, 255, 0.07)"
  input-label-ink-color: "var(--light-primary-color)"
  input-ink-color: "var(--primary-text-color)"
  input-idle-line-color: "rgba(180, 143, 255, 0.28)"
  input-hover-line-color: "rgba(180, 143, 255, 0.58)"
  input-disabled-fill-color: "rgba(255, 255, 255, 0.03)"
  input-disabled-ink-color: "var(--disabled-text-color)"
  input-disabled-line-color: "rgba(255, 255, 255, 0.06)"
  input-outlined-idle-border-color: "rgba(180, 143, 255, 0.28)"
  input-outlined-hover-border-color: "rgba(180, 143, 255, 0.62)"
  input-outlined-disabled-border-color: "rgba(180, 143, 255, 0.10)"
  mdc-text-field-fill-color: "rgba(12, 9, 30, 0.65)"
  mdc-text-field-ink-color: "var(--primary-text-color)"
  mdc-text-field-label-ink-color: "var(--secondary-text-color)"
  mdc-select-fill-color: "rgba(12, 9, 30, 0.65)"
  mdc-select-ink-color: "var(--primary-text-color)"
  mdc-select-label-ink-color: "var(--secondary-text-color)"
  mdc-select-idle-line-color: "rgba(180, 143, 255, 0.28)"
  mdc-select-hover-line-color: "rgba(180, 143, 255, 0.58)"
  mdc-theme-primary: "var(--primary-color)"
  mdc-theme-secondary: "var(--accent-color)"
  mdc-theme-on-primary: "#FFFFFF"
  mdc-theme-on-secondary: "#0A0B1E"
  mdc-theme-surface: "rgba(16, 12, 42, 0.80)"
  mdc-theme-background: "var(--primary-background-color)"
  mdc-theme-error: "var(--error-color)"

  # ── 13. Sliders ───────────────────────────────────────────────
  paper-slider-knob-color: "var(--primary-color)"
  paper-slider-knob-start-color: "var(--primary-color)"
  paper-slider-pin-color: "var(--primary-color)"
  paper-slider-active-color: "var(--primary-color)"
  paper-slider-secondary-color: "var(--light-primary-color)"
  paper-slider-disabled-active-color: "var(--disabled-text-color)"
  paper-slider-disabled-secondary-color: "var(--disabled-text-color)"
  paper-slider-container-color: "rgba(180, 143, 255, 0.18)"

  # ── 14. Toggles & Switches ────────────────────────────────────
  paper-toggle-button-checked-button-color: "#F4F0FF"
  paper-toggle-button-checked-bar-color: "var(--primary-color)"
  paper-toggle-button-unchecked-button-color: "#B8AEDE"
  paper-toggle-button-unchecked-bar-color: "rgba(94, 82, 144, 0.44)"
  switch-checked-color: "var(--primary-color)"
  switch-checked-button-color: "#FFFFFF"
  switch-checked-track-color: "var(--primary-color)"
  switch-unchecked-button-color: "#8276AA"
  switch-unchecked-track-color: "rgba(88, 74, 128, 0.40)"

  # ── 15. States, Icons & Badges ────────────────────────────────
  state-icon-color: "var(--primary-color)"
  state-icon-active-color: "#E8933A"
  state-icon-unavailable-color: "var(--disabled-text-color)"
  state-on-color: "var(--primary-color)"
  state-off-color: "#453C5E"
  label-badge-background-color: "rgba(180, 143, 255, 0.13)"
  label-badge-text-color: "var(--primary-text-color)"
  label-badge-border-color: "rgba(180, 143, 255, 0.22)"
  label-badge-red: "#CF5070"
  label-badge-yellow: "#E8933A"
  label-badge-green: "#64C9A0"
  label-badge-blue: "#7AACF0"
  label-badge-grey: "#544A72"

  # ── 16. Tables ────────────────────────────────────────────────
  table-row-background-color: "rgba(10, 8, 26, 0.50)"
  table-row-alternative-background-color: "rgba(180, 143, 255, 0.04)"
  data-table-background-color: "rgba(10, 8, 26, 0.58)"

  # ── 17. Navigation & Tabs ─────────────────────────────────────
  mdc-tab-text-label-color-default: "var(--secondary-text-color)"
  paper-tabs-selection-bar-color: "var(--primary-color)"

  # ── 18. Energy Dashboard ──────────────────────────────────────
  energy-grid-consumption-color: "#7AACF0"
  energy-grid-return-color: "#B48FFF"
  energy-solar-color: "#E8933A"
  energy-battery-in-color: "#64C9A0"
  energy-battery-out-color: "#CEBFFF"
  energy-home-color: "#BCB2DE"
  energy-gas-color: "#F2B06A"
  energy-water-color: "#6BC4D4"

  # ── 19. Modern HA Color API ───────────────────────────────────
  ha-color-neutral-95: "#060714"
  wa-color-surface-default: "#07081C"
  ha-color-fill-primary-quiet-resting: "rgba(180, 143, 255, 0.16)"
  ha-color-fill-primary-quiet-hover: "rgba(180, 143, 255, 0.26)"
  ha-color-fill-primary-quiet-pressed: "rgba(180, 143, 255, 0.34)"
  ha-color-fill-neutral-normal-resting: "#18143C"
  ha-color-fill-neutral-normal-hover: "#201A4A"
  ha-color-fill-neutral-quiet-resting: "rgba(180, 143, 255, 0.06)"
  ha-color-fill-neutral-quiet-hover: "rgba(180, 143, 255, 0.12)"
  ha-color-form-background-hover: "#130F35"
  ha-color-border-neutral-quiet: "var(--divider-color)"
  ha-color-border-neutral-default: "rgba(180, 143, 255, 0.22)"
  wa-color-surface-border: "var(--divider-color)"
  wa-color-neutral-fill-normal: "rgba(180, 143, 255, 0.82)"
  ha-color-text-primary: "var(--primary-text-color)"
  ha-color-text-secondary: "var(--secondary-text-color)"
  ha-color-text-disabled: "var(--disabled-text-color)"

  # ── 20. Scrollbar & Ripple ────────────────────────────────────
  scrollbar-thumb-color: "rgba(180, 143, 255, 0.22)"
  mdc-ripple-color: "var(--primary-color)"
  mdc-ripple-press-opacity: "0.11"


Your Name. - Tiamat:
  # ══════════════════════════════════════════════════════════════
  # TIAMAT
  # The comet itself — its ion tail blazes electric blue across
  # a deep navy sky. Same amber heart, same lake below,
  # but where the other theme is dusk-lavender, this one
  # crackles with the cold light of something falling from space.
  #
  # Primary:    #3BBCFF  — electric blue (comet ion tail)
  # Light:      #7DD4FF  — comet coma glow
  # Dark:       #0096D8  — deep ion blue
  # Accent:     #E8933A  — comet amber nucleus (twin to Kataware-doki)
  # BG:         #07101E  — deep navy sky, not black
  # Card:       rgba(8, 20, 44, 0.52) — navy frosted glass
  # Water/teal: #6BC4D4  — Lake Itomori (shared with twin)
  # ══════════════════════════════════════════════════════════════

  # ── 1. Backdrop & Blur ────────────────────────────────────────
  # Scrim: midnight navy — the sky the comet falls through
  ha-dialog-scrim-backdrop-filter: "blur(18px)"
  ha-dialog-scrim-background: "rgba(4, 10, 24, 0.60)"

  # ── 2. Typography ─────────────────────────────────────────────
  ha-font-family-body: "'Sora', 'DM Sans', system-ui, Arial, sans-serif"
  primary-font-family: "'Sora', 'DM Sans', system-ui, Arial, sans-serif"
  paper-font-common-base_-_font-family: "var(--primary-font-family)"
  paper-font-common-code_-_font-family: "'JetBrains Mono', 'Consolas', monospace"
  paper-font-body1_-_font-family: "var(--primary-font-family)"
  paper-font-subhead_-_font-family: "var(--primary-font-family)"
  paper-font-headline_-_font-family: "var(--primary-font-family)"
  paper-font-caption_-_font-family: "var(--primary-font-family)"
  paper-font-title_-_font-family: "var(--primary-font-family)"
  ha-card-header-font-family: "var(--primary-font-family)"
  ha-card-header-font-size: "15px"
  ha-card-header-letter-spacing: "0.01em"

  # ── 3. Header ─────────────────────────────────────────────────
  # Frosted deep-navy bar — the edge of space above the atmosphere
  header-height: 40px
  app-header-background-color: "rgba(5, 10, 22, 0.66)"
  app-header-text-color: "#E8F4FF"
  app-header-edit-background-color: "rgba(8, 18, 42, 0.84)"
  app-header-edit-text-color: "#E8F4FF"
  app-header-selection-bar-color: "#3BBCFF"

  # ── 4. Lovelace Background ────────────────────────────────────
  lovelace-background: 'center / cover no-repeat url("/local/backgrounds/yourname.jpg") fixed'

  # ── 5. Global Color Tokens ────────────────────────────────────
  # Electric blue primary — vivid, cold, luminous
  primary-color: "#3BBCFF"
  light-primary-color: "#7DD4FF"
  dark-primary-color: "#0096D8"
  # Comet amber accent — identical to Kataware-doki (the twin bond)
  accent-color: "#E8933A"
  light-accent-color: "#F2B06A"
  # Feedback palette — cool-toned to match the blue sky
  error-color: "#FF5F7A"
  warning-color: "#E8933A"
  success-color: "#4DCFAA"
  info-color: "#3BBCFF"

  # ── 6. Backgrounds ────────────────────────────────────────────
  # Deep navy — not black, unmistakably blue when cards sit on it
  primary-background-color: "#07101E"
  secondary-background-color: "#0B1628"
  rgb-primary-background-color: "7, 16, 30"
  rgb-secondary-background-color: "11, 22, 40"

  # ── 7. Text ───────────────────────────────────────────────────
  # Cool-white with a blue undertone — starlight on dark water
  primary-text-color: "#E8F4FF"
  secondary-text-color: "#7EB8D8"
  text-primary-color: "var(--primary-text-color)"
  disabled-text-color: "#2E4D6A"
  text-accent-color: "#1C3557"
  error-state-color: "var(--error-color)"

  # ── 8. Dividers & Code ────────────────────────────────────────
  # Electric blue tint — thin but unmistakable
  divider-color: "rgba(59, 188, 255, 0.13)"
  markdown-code-background-color: "rgba(5, 14, 30, 0.74)"

  # ── 9. Sidebar ────────────────────────────────────────────────
  # Navy frosted panel — a cold glass wall open to the night
  sidebar-background-color: "rgba(6, 12, 26, 0.64)"
  sidebar-icon-color: "#376E96"
  sidebar-text-color: "#90C4E0"
  sidebar-selected-background-color: "rgba(59, 188, 255, 0.14)"
  sidebar-selected-icon-color: "#7DD4FF"
  sidebar-selected-text-color: "#E8F4FF"

  # ── 10. Cards ─────────────────────────────────────────────────
  # Navy-blue frosted glass — deeper and cooler than Kataware-doki
  ha-card-border-radius: "16px"
  ha-card-background: "rgba(8, 20, 44, 0.52)"
  ha-card-box-shadow: "0 2px 28px rgba(0, 0, 0, 0.50), inset 0 1px 0 rgba(59, 188, 255, 0.08)"
  ha-card-border-color: "rgba(59, 188, 255, 0.11)"
  ha-card-border-width: "1px"
  ha-card-header-color: "var(--primary-text-color)"
  card-background-color: "rgba(8, 20, 44, 0.52)"
  paper-card-background-color: "rgba(8, 20, 44, 0.52)"
  paper-card-header-color: "var(--primary-text-color)"
  paper-listbox-background-color: "rgba(5, 12, 28, 0.78)"
  rgb-card-background-color: "8, 20, 44"

  # ── 11. Dialogs & Popups ──────────────────────────────────────
  mdc-dialog-box-shadow: "0 8px 56px rgba(0, 0, 0, 0.65)"
  popup-background-color: "rgba(6, 14, 34, 0.90)"

  # ── 12. Inputs & Forms ────────────────────────────────────────
  input-fill-color: "rgba(59, 188, 255, 0.07)"
  input-label-ink-color: "var(--light-primary-color)"
  input-ink-color: "var(--primary-text-color)"
  input-idle-line-color: "rgba(59, 188, 255, 0.28)"
  input-hover-line-color: "rgba(59, 188, 255, 0.60)"
  input-disabled-fill-color: "rgba(255, 255, 255, 0.03)"
  input-disabled-ink-color: "var(--disabled-text-color)"
  input-disabled-line-color: "rgba(255, 255, 255, 0.05)"
  input-outlined-idle-border-color: "rgba(59, 188, 255, 0.28)"
  input-outlined-hover-border-color: "rgba(59, 188, 255, 0.64)"
  input-outlined-disabled-border-color: "rgba(59, 188, 255, 0.10)"
  mdc-text-field-fill-color: "rgba(5, 14, 32, 0.68)"
  mdc-text-field-ink-color: "var(--primary-text-color)"
  mdc-text-field-label-ink-color: "var(--secondary-text-color)"
  mdc-select-fill-color: "rgba(5, 14, 32, 0.68)"
  mdc-select-ink-color: "var(--primary-text-color)"
  mdc-select-label-ink-color: "var(--secondary-text-color)"
  mdc-select-idle-line-color: "rgba(59, 188, 255, 0.28)"
  mdc-select-hover-line-color: "rgba(59, 188, 255, 0.60)"
  mdc-theme-primary: "var(--primary-color)"
  mdc-theme-secondary: "var(--accent-color)"
  mdc-theme-on-primary: "#07101E"
  mdc-theme-on-secondary: "#07101E"
  mdc-theme-surface: "rgba(8, 20, 44, 0.82)"
  mdc-theme-background: "var(--primary-background-color)"
  mdc-theme-error: "var(--error-color)"

  # ── 13. Sliders ───────────────────────────────────────────────
  paper-slider-knob-color: "var(--primary-color)"
  paper-slider-knob-start-color: "var(--primary-color)"
  paper-slider-pin-color: "var(--primary-color)"
  paper-slider-active-color: "var(--primary-color)"
  paper-slider-secondary-color: "var(--light-primary-color)"
  paper-slider-disabled-active-color: "var(--disabled-text-color)"
  paper-slider-disabled-secondary-color: "var(--disabled-text-color)"
  paper-slider-container-color: "rgba(59, 188, 255, 0.16)"

  # ── 14. Toggles & Switches ────────────────────────────────────
  # On → electric blue bar, crisp white knob.
  # Off → muted steel blue — a cold, unlit colour.
  paper-toggle-button-checked-button-color: "#EEF8FF"
  paper-toggle-button-checked-bar-color: "var(--primary-color)"
  paper-toggle-button-unchecked-button-color: "#5A8AAE"
  paper-toggle-button-unchecked-bar-color: "rgba(50, 90, 130, 0.46)"
  switch-checked-color: "var(--primary-color)"
  switch-checked-button-color: "#FFFFFF"
  switch-checked-track-color: "var(--primary-color)"
  switch-unchecked-button-color: "#3E6882"
  switch-unchecked-track-color: "rgba(40, 80, 120, 0.42)"

  # ── 15. States, Icons & Badges ────────────────────────────────
  # Active → comet amber (the nucleus burns warm even in the blue tail)
  # Default → electric blue
  state-icon-color: "var(--primary-color)"
  state-icon-active-color: "#E8933A"
  state-icon-unavailable-color: "var(--disabled-text-color)"
  state-on-color: "var(--primary-color)"
  state-off-color: "#1E3A52"
  label-badge-background-color: "rgba(59, 188, 255, 0.12)"
  label-badge-text-color: "var(--primary-text-color)"
  label-badge-border-color: "rgba(59, 188, 255, 0.22)"
  label-badge-red: "#FF5F7A"
  label-badge-yellow: "#E8933A"
  label-badge-green: "#4DCFAA"
  label-badge-blue: "#3BBCFF"
  label-badge-grey: "#2E4D6A"

  # ── 16. Tables ────────────────────────────────────────────────
  table-row-background-color: "rgba(6, 14, 30, 0.52)"
  table-row-alternative-background-color: "rgba(59, 188, 255, 0.04)"
  data-table-background-color: "rgba(6, 14, 30, 0.60)"

  # ── 17. Navigation & Tabs ─────────────────────────────────────
  mdc-tab-text-label-color-default: "var(--secondary-text-color)"
  paper-tabs-selection-bar-color: "var(--primary-color)"

  # ── 18. Energy Dashboard ──────────────────────────────────────
  # Blue-family mapping — the comet's light colours everything cold
  energy-grid-consumption-color: "#3BBCFF"
  energy-grid-return-color: "#7DD4FF"
  energy-solar-color: "#E8933A"
  energy-battery-in-color: "#4DCFAA"
  energy-battery-out-color: "#A8DEFF"
  energy-home-color: "#90C4E0"
  energy-gas-color: "#F2B06A"
  energy-water-color: "#6BC4D4"

  # ── 19. Modern HA Color API ───────────────────────────────────
  # Blue-mapped equivalents of all ha-color-* / wa-color-* tokens
  ha-color-neutral-95: "#040C1A"
  wa-color-surface-default: "#07101E"
  ha-color-fill-primary-quiet-resting: "rgba(59, 188, 255, 0.14)"
  ha-color-fill-primary-quiet-hover: "rgba(59, 188, 255, 0.24)"
  ha-color-fill-primary-quiet-pressed: "rgba(59, 188, 255, 0.32)"
  ha-color-fill-neutral-normal-resting: "#0E2038"
  ha-color-fill-neutral-normal-hover: "#142840"
